[project]
site_name = "Guide Smart Hydroponic"
site_description = "Dokumentasi berbasis web untuk mempelajari dan mengembangkan sistem Smart Hydroponic"
site_author = "Smart Hydroponic Research Group"
site_url = "https://iot-smart-hydroponic.github.io/smart-hydroponic/"
repo_url = "https://github.com/IoT-Smart-Hydroponic/smart-hydroponic/"
repo_name = "IoT-Smart-Hydroponic/smart-hydroponic"
copyright = "Copyright &copy; 2026 Smart Hydroponic Research Group"

nav = [
  { "Pengantar" = [
    { "Selamat Datang" = "index.md" },
    { "Cara Membaca Dokumentasi" = "how-to-read.md" },
    { "Memulai Sistem Smart Hydroponic" = "getting-started.md" },
  ] },
  { "Sistem" = [
    { "Arsitektur Sistem" = "architecture.md" },
    { "Tech Stack" = "tech-stack.md" },
    { "Struktur Proyek" = "project-structure.md" },
  ] },
  { "Hardware" = [
    { "Hardware dan Sensor" = "hardware.md" },
  ] },
  { "Backend" = [
    { "Pengembangan Backend" = "backend/development.md" },
    { "Setup Database" = "backend/setup_database.md" },
    { "Cara Akses Database" = "backend/database_access.md" },
    { "Akses Server dengan SSH" = "backend/deploy_ssh.md" },
    { "Deploy Backend Python" = "backend/deploy_python.md" },
    { "Setup NGINX" = "backend/setup_nginx.md" },
  ] },
  { "Frontend" = [
    { "Pengembangan Frontend Vue" = "frontend/development.md" },
    { "Deploy Frontend Vue" = "frontend/deploy.md" },
  ] },
  { "Bantuan" = [
    { "Troubleshooting" = "troubleshooting.md" },
    { "Glossary" = "glossary.md" },
  ] },
  { "Tim" = [
    { "Contributors" = "contributors.md" },
  ] },
]

[project.theme]
language = "id"
logo = "assets/logo.png"
favicon = "assets/favicon.ico"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "search.highlight",
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
